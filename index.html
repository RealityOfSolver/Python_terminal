<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; overflow: hidden; }
        #terminal { 
            white-space: pre; 
            font-size: 1.2vw; /* Scales size for iPad screen */
            line-height: 1;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="status">Loading NumPy...</div>
    <div id="terminal"></div>

    <script>
        async function run() {
            let pyodide = await loadPyodide();
            // Load NumPy before running script
            await pyodide.loadPackage("numpy");
            
            const status = document.getElementById('status');
            const terminal = document.getElementById('terminal');
            
            // Cache buster for iPad
            const response = await fetch('script.py?v=' + Math.random());
            const code = await response.text();
            
            pyodide.setStdout({ batched: (str) => {
                terminal.innerText = str; // Overwrites instead of appends
            }});
            
            status.style.display = 'none';
            pyodide.runPython(code);
        }
        run();
    </script>
</body>
</html>
